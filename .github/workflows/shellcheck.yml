name: ShellCheck
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  shellcheck:
    name: Run ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck on scripts
        run: |
          echo "Finding shell scripts..."
          files=$(git ls-files '*.sh' || true)
          if [ -z "$files" ]; then
            echo "No shell scripts found."
            exit 0
          fi
          echo "Running ShellCheck on the following files:"
          echo "$files"
          shellcheck -x $files
        # Do not fail the workflow on ShellCheck findings so annotations are visible
        continue-on-error: true